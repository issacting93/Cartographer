<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Global View</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/file_list.js"></script>
    <link href="css/bloom.css" rel="stylesheet">
    <style>
        #drop-zone { display: none !important; }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .filter-pill {
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--gray);
            background: white;
            color: var(--text);
            transition: all 0.2s ease;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .filter-pill:hover { border-color: var(--black); }

        .filter-pill.active {
            background: var(--black);
            color: white;
            border-color: var(--black);
        }

        .filter-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .filter-pill.active .dot {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6);
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            font-size: 12px;
        }

        .breakdown-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
        }

        .breakdown-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .breakdown-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .breakdown-bar {
            flex: 1;
            height: 6px;
            background: var(--gray);
            border-radius: 3px;
            margin: 0 8px;
            overflow: hidden;
        }

        .breakdown-fill {
            height: 100%;
            border-radius: 3px;
        }

        #right-panel {
            width: 320px;
            max-width: 320px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .kpi-card {
            background: white;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }

        .kpi-value {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        .kpi-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .dist-bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            font-size: 11px;
        }

        .dist-bar-label {
            width: 100px;
            text-align: right;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .dist-bar-track {
            flex: 1;
            height: 8px;
            background: var(--gray);
            border-radius: 4px;
            overflow: hidden;
        }

        .dist-bar-fill {
            height: 100%;
            border-radius: 4px;
        }

        .dist-bar-pct {
            width: 30px;
            font-size: 10px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .node-detail-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--gray);
        }

        .node-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin: 2px;
        }

        .node-pad-row {
            display: flex;
            justify-content: space-around;
            margin-top: 8px;
        }

        .pad-mini {
            text-align: center;
        }

        .pad-mini-value {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .pad-mini-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="left-panel" class="panel">
        <div class="guide-header"
            style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--gray);">
            <h1>BLOOM Atlas</h1>
            <p style="font-size: 12px; color: var(--text-dim);">Corpus Explorer &middot; N=745</p>
            <a href="index.html" style="font-size: 12px; color: var(--accent); text-decoration: none;">&larr; Back to Suite</a>
        </div>

        <div class="panel-section">
            <div id="file-selector-container">
                <input type="text" id="file-search" list="file-list" placeholder="Search conversations...">
                <datalist id="file-list"></datalist>
                <div style="margin-top: 10px; display: flex; justify-content: flex-end;">
                    <button id="load-btn" class="btn btn-primary">
                        <span class="material-symbols-rounded">play_arrow</span> Open
                    </button>
                </div>
            </div>
        </div>

        <div class="panel-section">
            <div class="panel-title">Color By</div>
            <select id="color-select">
                <option value="stability">Stability Class</option>
                <option value="dominant_human_role">Dominant Human Role</option>
                <option value="dominant_ai_role">Dominant AI Role</option>
                <option value="interactionPattern">Interaction Pattern</option>
                <option value="emotionalTone">Emotional Tone</option>
                <option value="powerDynamics">Power Dynamics</option>
                <option value="drift_velocity">Drift Velocity</option>
            </select>
        </div>

        <div class="panel-section">
            <div class="panel-title">Cluster By</div>
            <select id="layout-select">
                <option value="force">None (Force Layout)</option>
                <option value="stability">Stability Class</option>
                <option value="dominant_human_role">Dominant Human Role</option>
                <option value="interactionPattern">Interaction Pattern</option>
                <option value="powerDynamics">Power Dynamics</option>
                <option value="source">Data Source</option>
            </select>
        </div>

        <div class="panel-section">
            <div class="panel-title">Size By</div>
            <select id="size-select">
                <option value="turn_count">Turn Count</option>
                <option value="constraint_count">Constraint Count</option>
                <option value="drift_velocity">Drift Velocity</option>
                <option value="violation_count">Violation Count</option>
                <option value="uniform">Uniform</option>
            </select>
        </div>

        <div class="panel-section">
            <div class="panel-title">Filter</div>
            <div id="filter-pills" class="filter-group"></div>
        </div>

        <div class="panel-section">
            <div class="panel-title">Legend</div>
            <div id="dynamic-legend" style="display: flex; flex-direction: column; gap: 4px;"></div>
        </div>
    </div>

    <div id="center-panel">
        <div class="tooltip" id="tooltip"></div>
        <svg id="viz"></svg>
    </div>

    <div id="right-panel" class="panel">
        <!-- Corpus KPIs -->
        <div id="corpus-kpis" class="panel-section">
            <div class="panel-title">Corpus Insights</div>
            <div class="kpi-grid" id="kpi-grid"></div>
        </div>

        <!-- Role distribution -->
        <div id="corpus-roles" class="panel-section">
            <div class="panel-title">Human Role Distribution</div>
            <div id="human-role-corpus"></div>
            <div class="panel-title" style="margin-top: 10px;">AI Role Distribution</div>
            <div id="ai-role-corpus"></div>
        </div>

        <!-- Pattern distribution -->
        <div id="corpus-patterns" class="panel-section">
            <div class="panel-title">Interaction Patterns</div>
            <div id="pattern-corpus"></div>
        </div>

        <!-- Node inspector (shown on click) -->
        <div id="metadata-panel" class="node-info" style="display: none;">
            <div class="panel-title">Conversation Detail</div>
            <div id="metadata-content"></div>
        </div>

        <div id="empty-details" style="text-align: center; color: var(--text-dim); margin-top: 20px;">
            <span class="material-symbols-rounded" style="font-size: 48px; color: var(--gray); margin-bottom: 10px;">hub</span>
            <p>Click a node to inspect</p>
            <p style="font-size: 11px; margin-top: 4px;">Double-click to open in Explorer</p>
        </div>
    </div>

    <script>
        // ── Color Palettes ──
        const PALETTES = {
            stability: {
                "Task Maintained": "#22c55e",
                "Constraint Drift": "#f5c542",
                "Task Shift": "#e85a3c",
                "Agency Collapse": "#f87171",
                "No Constraints": "#94a3b8"
            },
            dominant_human_role: {
                "information-seeker": "#60a5fa",
                "director": "#1a1a1a",
                "provider": "#f5c542",
                "collaborator": "#22c55e",
                "social-expressor": "#c084fc",
                "relational-peer": "#f87171"
            },
            dominant_ai_role: {
                "expert-system": "#1a1a1a",
                "co-constructor": "#22c55e",
                "advisor": "#f5c542",
                "learning-facilitator": "#60a5fa",
                "social-facilitator": "#c084fc",
                "relational-peer": "#f87171"
            },
            interactionPattern: {
                "question-answer": "#60a5fa",
                "collaborative": "#22c55e",
                "advisory": "#f5c542",
                "storytelling": "#c084fc",
                "casual-chat": "#f87171",
                "debate": "#e85a3c",
                "artistic-expression": "#94a3b8",
                "philosophical-dialogue": "#2dd4bf"
            },
            emotionalTone: {
                "neutral": "#94a3b8",
                "professional": "#1a1a1a",
                "supportive": "#22c55e",
                "playful": "#f5c542",
                "serious": "#e85a3c",
                "empathetic": "#c084fc"
            },
            powerDynamics: {
                "human-led": "#1a1a1a",
                "balanced": "#22c55e",
                "ai-led": "#f5c542",
                "alternating": "#c084fc"
            },
            source: {
                "WildChat": "#60a5fa",
                "lmsys-chat-1m": "#f5c542",
                "ChatbotArena": "#f5c542",
                "OASST": "#c084fc",
                "OpenAssistant": "#c084fc"
            }
        };

        const SOURCE_LABELS = {
            "WildChat": "WildChat",
            "lmsys-chat-1m": "ChatbotArena",
            "OASST": "OASST",
            "OpenAssistant": "OpenAssistant",
            "ChatbotArena": "ChatbotArena"
        };

        // ── State ──
        const STATE = {
            colorField: 'stability',
            clusterField: 'force',
            sizeField: 'turn_count',
            activeFilters: new Set()
        };

        const svg = d3.select("#viz");
        const tooltip = d3.select("#tooltip");
        let currentData = null;
        let simulation = null;

        // ── Init ──
        loadAtlas();

        // File search
        const fileSearch = document.getElementById('file-search');
        const fileList = document.getElementById('file-list');
        const loadBtn = document.getElementById('load-btn');

        files.forEach(f => {
            const option = document.createElement('option');
            option.value = f;
            fileList.appendChild(option);
        });

        loadBtn.addEventListener('click', () => {
            const filename = fileSearch.value;
            if (filename) window.open(`explorer.html?file=${filename}`, '_blank');
        });

        // Controls
        document.getElementById('color-select').addEventListener('change', e => {
            STATE.colorField = e.target.value;
            if (currentData) { buildFilterPills(); renderAtlas(currentData); }
        });

        document.getElementById('layout-select').addEventListener('change', e => {
            STATE.clusterField = e.target.value;
            if (currentData) renderAtlas(currentData);
        });

        document.getElementById('size-select').addEventListener('change', e => {
            STATE.sizeField = e.target.value;
            if (currentData) renderAtlas(currentData);
        });

        // ── Load ──
        async function loadAtlas() {
            try {
                const response = await fetch("data/meta_graph.json");
                if (!response.ok) throw new Error("Meta-graph not found");
                const data = await response.json();
                currentData = data;
                buildFilterPills();
                renderCorpusInsights(data);
                renderAtlas(data);
            } catch (err) {
                alert("Could not load Atlas: " + err.message);
            }
        }

        // ── Filter Pills ──
        function buildFilterPills() {
            if (!currentData) return;
            const container = document.getElementById('filter-pills');
            container.innerHTML = '';

            const field = STATE.colorField;
            const palette = PALETTES[field] || {};
            const values = [...new Set(currentData.nodes.map(n => n[field]).filter(Boolean))];
            values.sort();

            STATE.activeFilters = new Set(values);

            values.forEach(v => {
                const pill = document.createElement('div');
                pill.className = 'filter-pill active';
                const color = palette[v] || '#94a3b8';
                pill.innerHTML = `<span class="dot" style="background: ${color}"></span>${v}`;
                pill.addEventListener('click', () => {
                    if (STATE.activeFilters.has(v)) {
                        STATE.activeFilters.delete(v);
                        pill.classList.remove('active');
                    } else {
                        STATE.activeFilters.add(v);
                        pill.classList.add('active');
                    }
                    if (currentData) renderAtlas(currentData);
                });
                container.appendChild(pill);
            });

            // Update legend
            updateLegend(palette, values);
        }

        function updateLegend(palette, values) {
            const container = document.getElementById('dynamic-legend');
            container.innerHTML = '';
            values.forEach(v => {
                const color = palette[v] || '#94a3b8';
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<span class="swatch" style="background: ${color}"></span> ${v}`;
                container.appendChild(item);
            });
        }

        // ── Corpus Insights (Right Panel) ──
        function renderCorpusInsights(data) {
            const nodes = data.nodes;
            const total = nodes.length;
            const withViolations = nodes.filter(n => (n.violation_count || 0) > 0).length;
            const withConstraints = nodes.filter(n => (n.constraint_count || 0) > 0).length;
            const drifts = nodes.map(n => n.drift_velocity || 0);
            const meanDrift = drifts.reduce((a, b) => a + b, 0) / total;
            const pleasures = nodes.filter(n => n.mean_pleasure != null).map(n => n.mean_pleasure);
            const meanPleasure = pleasures.length ? pleasures.reduce((a, b) => a + b, 0) / pleasures.length : 0;

            // Collapse rate (Agency Collapse / those with constraints)
            const collapseCount = nodes.filter(n => n.stability === 'Agency Collapse').length;
            const collapseRate = withConstraints > 0 ? (collapseCount / withConstraints * 100) : 0;

            // Instrumental rate
            const instrumentalRoles = ['information-seeker', 'provider', 'director', 'collaborator'];
            const withRole = nodes.filter(n => n.dominant_human_role);
            const instrumental = withRole.filter(n => instrumentalRoles.includes(n.dominant_human_role));
            const instrumentalRate = withRole.length > 0 ? (instrumental.length / withRole.length * 100) : 0;

            // KPIs
            document.getElementById('kpi-grid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-value">${total}</div>
                    <div class="kpi-label">Conversations</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${meanDrift.toFixed(2)}</div>
                    <div class="kpi-label">Mean Drift Vel.</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value" style="color: var(--red);">${collapseRate.toFixed(0)}%</div>
                    <div class="kpi-label">Collapse Rate</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${instrumentalRate.toFixed(0)}%</div>
                    <div class="kpi-label">Instrumental</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${meanPleasure.toFixed(2)}</div>
                    <div class="kpi-label">Mean Pleasure</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${withViolations}</div>
                    <div class="kpi-label">With Violations</div>
                </div>
            `;

            // Human role distribution
            renderCorpusDist('human-role-corpus', nodes, 'dominant_human_role',
                PALETTES.dominant_human_role);

            // AI role distribution
            renderCorpusDist('ai-role-corpus', nodes, 'dominant_ai_role',
                PALETTES.dominant_ai_role);

            // Interaction pattern distribution
            renderCorpusDist('pattern-corpus', nodes, 'interactionPattern',
                PALETTES.interactionPattern);
        }

        function renderCorpusDist(containerId, nodes, field, palette) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const counts = {};
            nodes.forEach(n => {
                const v = n[field];
                if (v) counts[v] = (counts[v] || 0) + 1;
            });

            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

            sorted.forEach(([label, count]) => {
                const pct = (count / total * 100);
                const color = (palette && palette[label]) || '#94a3b8';

                const row = document.createElement('div');
                row.className = 'dist-bar-row';
                row.innerHTML = `
                    <div class="dist-bar-label">${label}</div>
                    <div class="dist-bar-track">
                        <div class="dist-bar-fill" style="width: ${pct}%; background: ${color};"></div>
                    </div>
                    <div class="dist-bar-pct">${pct.toFixed(0)}%</div>
                `;
                container.appendChild(row);
            });
        }

        // ── Node sizing ──
        function nodeRadius(d) {
            if (STATE.sizeField === 'uniform') return 5;
            const val = d[STATE.sizeField] || 0;
            if (STATE.sizeField === 'drift_velocity') return Math.max(3, val * 15);
            return Math.max(3, Math.sqrt(val) * 2);
        }

        // ── Node color ──
        function nodeColor(d) {
            const field = STATE.colorField;
            if (field === 'drift_velocity') {
                // Continuous scale: green (0) → yellow (0.3) → red (0.6+)
                const v = Math.min(d.drift_velocity || 0, 0.8);
                const scale = d3.scaleSequential(d3.interpolateRdYlGn).domain([0.8, 0]);
                return scale(v);
            }
            const palette = PALETTES[field] || {};
            return palette[d[field]] || '#94a3b8';
        }

        // ── Cluster foci ──
        function getClusterFoci(field, width, height, values) {
            const unique = values.filter(Boolean);
            const n = unique.length;
            if (n === 0) return {};

            const foci = {};
            // Arrange in a grid
            const cols = Math.ceil(Math.sqrt(n));
            const rows = Math.ceil(n / cols);
            unique.forEach((v, i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                foci[v] = {
                    x: (col + 0.5) / cols * width,
                    y: (row + 0.5) / rows * height
                };
            });
            return foci;
        }

        // ── Main Render ──
        function renderAtlas(data) {
            svg.selectAll("*").remove();

            const width = document.getElementById('center-panel').clientWidth;
            const height = document.getElementById('center-panel').clientHeight;
            const container = svg.append("g");

            const zoom = d3.zoom()
                .scaleExtent([0.1, 8])
                .on("zoom", (event) => container.attr("transform", event.transform));
            svg.call(zoom);

            // Filter nodes
            const colorField = STATE.colorField;
            const nodes = data.nodes.filter(n => {
                const val = n[colorField];
                if (!val) return STATE.activeFilters.size === 0;
                return STATE.activeFilters.has(val);
            });
            const nodeIds = new Set(nodes.map(n => n.id));

            const links = data.links.filter(l => {
                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeIds.has(sId) && nodeIds.has(tId);
            });

            if (simulation) simulation.stop();

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(80))
                .force("charge", d3.forceManyBody().strength(-60))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide(d => nodeRadius(d) + 2));

            // Apply clustering
            const clusterField = STATE.clusterField;
            if (clusterField !== 'force') {
                const uniqueVals = [...new Set(nodes.map(n => n[clusterField]).filter(Boolean))];
                const foci = getClusterFoci(clusterField, width, height, uniqueVals);

                simulation.force("x", d3.forceX(d => (foci[d[clusterField]] || { x: width / 2 }).x).strength(0.5));
                simulation.force("y", d3.forceY(d => (foci[d[clusterField]] || { y: height / 2 }).y).strength(0.5));
                simulation.force("charge", d3.forceManyBody().strength(-15));

                // Add cluster labels
                const labelLayer = container.append("g").attr("class", "cluster-labels");
                Object.entries(foci).forEach(([label, pos]) => {
                    labelLayer.append("text")
                        .attr("x", pos.x)
                        .attr("y", pos.y - 30)
                        .attr("text-anchor", "middle")
                        .attr("fill", "#999")
                        .attr("font-size", "11px")
                        .attr("font-weight", "600")
                        .attr("letter-spacing", "1px")
                        .text(label.toUpperCase());
                });
            }

            // Edges
            const link = container.append("g")
                .selectAll("line")
                .data(links)
                .enter().append("line")
                .attr("stroke", "#94a3b8")
                .attr("stroke-width", d => Math.max(0.5, (d.weight || 1) * 0.8))
                .attr("stroke-opacity", 0.15);

            // Nodes
            const node = container.append("g")
                .selectAll("g.atlas-node")
                .data(nodes)
                .enter().append("g")
                .attr("class", "atlas-node")
                .attr("cursor", "pointer")
                .call(makeDrag(simulation));

            node.append("circle")
                .attr("r", d => nodeRadius(d))
                .attr("fill", d => nodeColor(d))
                .attr("stroke", d => PALETTES.source[d.source] || "#94a3b8")
                .attr("stroke-width", 1.5)
                .attr("opacity", 0.85);

            // Interactions
            node.on("mouseover", (event, d) => {
                const hrole = d.dominant_human_role || '—';
                const arole = d.dominant_ai_role || '—';
                const pattern = d.interactionPattern || '—';
                tooltip.style("opacity", 1)
                    .html(`
                        <strong>${d.id}</strong><br>
                        <span style="color:var(--text-dim)">Stability:</span> ${d.stability || '—'}<br>
                        <span style="color:var(--text-dim)">Human:</span> ${hrole}<br>
                        <span style="color:var(--text-dim)">AI:</span> ${arole}<br>
                        <span style="color:var(--text-dim)">Pattern:</span> ${pattern}<br>
                        <span style="color:var(--text-dim)">Turns:</span> ${d.turn_count || 0} &middot;
                        <span style="color:var(--text-dim)">Violations:</span> ${d.violation_count || 0}
                    `)
                    .style("left", (event.pageX + 12) + "px")
                    .style("top", (event.pageY - 12) + "px");
            })
            .on("mousemove", (event) => {
                tooltip.style("left", (event.pageX + 12) + "px")
                       .style("top", (event.pageY - 12) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));

            let clickTimer = null;
            node.on("click", (event, d) => {
                event.stopPropagation();
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    focusNode(d, node, link, links);
                    showNodeDetail(d);
                }, 200);
            });

            node.on("dblclick", (event, d) => {
                event.stopPropagation();
                clearTimeout(clickTimer);
                if (d.filename) window.open(`explorer.html?file=${d.filename}`, '_blank');
            });

            svg.on("click", () => {
                node.style("opacity", 0.85);
                link.style("opacity", 0.15);
                d3.select("#metadata-panel").style("display", "none");
                document.getElementById('empty-details').style.display = 'block';
            });

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function focusNode(clickedNode, nodeSelection, linkSelection, links) {
            const neighbors = new Set([clickedNode.id]);
            links.forEach(l => {
                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                if (sId === clickedNode.id) neighbors.add(tId);
                if (tId === clickedNode.id) neighbors.add(sId);
            });

            nodeSelection.style("opacity", d => neighbors.has(d.id) ? 1 : 0.08);
            linkSelection.style("opacity", l => {
                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                return (sId === clickedNode.id || tId === clickedNode.id) ? 0.8 : 0.02;
            });
        }

        // ── Node Detail Panel ──
        function showNodeDetail(d) {
            d3.select("#metadata-panel").style("display", "block");
            document.getElementById('empty-details').style.display = 'none';

            const stabColor = PALETTES.stability[d.stability] || '#94a3b8';
            const hroleColor = PALETTES.dominant_human_role[d.dominant_human_role] || '#94a3b8';
            const aroleColor = PALETTES.dominant_ai_role[d.dominant_ai_role] || '#94a3b8';
            const patternColor = PALETTES.interactionPattern[d.interactionPattern] || '#94a3b8';

            let html = `
                <div style="margin-bottom: 10px;">
                    <div style="font-size: 0.75em; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em;">ID</div>
                    <div style="font-size: 0.9em; font-weight: bold; word-break: break-all;">${d.id}</div>
                </div>

                <div style="margin-bottom: 10px;">
                    <span class="node-badge" style="background: ${stabColor}20; color: ${stabColor}; border: 1px solid ${stabColor}40;">${d.stability || '—'}</span>
                    <span class="node-badge" style="background: ${patternColor}20; color: ${patternColor}; border: 1px solid ${patternColor}40;">${d.interactionPattern || '—'}</span>
                </div>

                <div style="margin-bottom: 8px;">
                    <span class="node-badge" style="background: ${hroleColor}20; color: ${hroleColor}; border: 1px solid ${hroleColor}40;">Human: ${d.dominant_human_role || '—'}</span>
                    <span class="node-badge" style="background: ${aroleColor}20; color: ${aroleColor}; border: 1px solid ${aroleColor}40;">AI: ${d.dominant_ai_role || '—'}</span>
                </div>
            `;

            // Stats grid
            html += `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; margin-bottom: 10px;">
                    <div><span style="color:var(--text-dim)">Turns:</span> <strong>${d.turn_count || 0}</strong></div>
                    <div><span style="color:var(--text-dim)">Constraints:</span> <strong>${d.constraint_count || 0}</strong></div>
                    <div><span style="color:var(--text-dim)">Violations:</span> <strong style="color: ${(d.violation_count || 0) > 0 ? 'var(--red)' : 'inherit'}">${d.violation_count || 0}</strong></div>
                    <div><span style="color:var(--text-dim)">Repairs:</span> <strong>${d.repair_count || 0}</strong></div>
                    <div><span style="color:var(--text-dim)">Drift:</span> <strong>${(d.drift_velocity || 0).toFixed(2)}</strong></div>
                    <div><span style="color:var(--text-dim)">Tone:</span> <strong>${d.emotionalTone || '—'}</strong></div>
                    <div><span style="color:var(--text-dim)">Power:</span> <strong>${d.powerDynamics || '—'}</strong></div>
                    <div><span style="color:var(--text-dim)">Source:</span> <strong>${SOURCE_LABELS[d.source] || d.source || '—'}</strong></div>
                </div>
            `;

            // PAD summary
            if (d.mean_pleasure != null) {
                html += `
                    <div class="node-detail-section">
                        <div class="panel-title">Affect (PAD)</div>
                        <div class="node-pad-row">
                            <div class="pad-mini">
                                <div class="pad-mini-value" style="color: var(--green)">${d.mean_pleasure.toFixed(2)}</div>
                                <div class="pad-mini-label">Pleasure</div>
                            </div>
                            <div class="pad-mini">
                                <div class="pad-mini-value" style="color: var(--orange)">${d.mean_arousal.toFixed(2)}</div>
                                <div class="pad-mini-label">Arousal</div>
                            </div>
                            <div class="pad-mini">
                                <div class="pad-mini-value" style="color: var(--blue)">${d.mean_dominance.toFixed(2)}</div>
                                <div class="pad-mini-label">Dominance</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Dominance comparison
            if (d.human_mean_dominance != null && d.ai_mean_dominance != null) {
                html += `
                    <div style="margin-top: 8px; font-size: 11px;">
                        <span style="color:var(--text-dim)">Human D:</span> <strong>${d.human_mean_dominance.toFixed(2)}</strong>
                        &nbsp;vs&nbsp;
                        <span style="color:var(--text-dim)">AI D:</span> <strong>${d.ai_mean_dominance.toFixed(2)}</strong>
                        ${d.human_mean_dominance < d.ai_mean_dominance ?
                            '<span style="color: var(--red); font-weight: 600; margin-left: 4px;">INVERTED</span>' : ''}
                    </div>
                `;
            }

            // Open in explorer button
            html += `
                <div style="margin-top: 14px; text-align: center;">
                    <button class="btn btn-secondary" style="height: 36px; font-size: 12px;"
                        onclick="window.open('explorer.html?file=${d.filename}', '_blank')">
                        <span class="material-symbols-rounded" style="font-size: 16px;">open_in_new</span> Open in Explorer
                    </button>
                </div>
            `;

            document.getElementById('metadata-content').innerHTML = html;
        }

        // ── Drag ──
        function makeDrag(sim) {
            return d3.drag()
                .on("start", (event) => {
                    if (!event.active) sim.alphaTarget(0.3).restart();
                    event.subject.fx = event.subject.x;
                    event.subject.fy = event.subject.y;
                })
                .on("drag", (event) => {
                    event.subject.fx = event.x;
                    event.subject.fy = event.y;
                })
                .on("end", (event) => {
                    if (!event.active) sim.alphaTarget(0);
                    event.subject.fx = null;
                    event.subject.fy = null;
                });
        }
    </script>

</body>

</html>
