<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Findings Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="css/bloom.css">
    <style>
        body {
            padding: 24px 32px;
            overflow-y: auto;
            height: auto;
            display: block;
            background: var(--bg);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--gray);
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            color: var(--text-dim);
            margin: 4px 0 0 0;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* Section titles */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 36px 0 16px 0;
            color: var(--black);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, var(--blue), var(--purple));
            border-radius: 2px;
        }

        /* Grid layouts */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 8px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 8px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 8px;
        }

        .full-width {
            margin-bottom: 8px;
        }

        /* Cards */
        .card {
            background: var(--bg-subtle);
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 20px;
        }

        .card h3 {
            margin: 0 0 8px 0;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        /* KPI cards */
        .kpi-value {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .kpi-detail {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .kpi-value.blue {
            color: var(--blue);
        }

        .kpi-value.red {
            color: var(--red);
        }

        .kpi-value.orange {
            color: var(--orange);
        }

        .kpi-value.green {
            color: var(--green);
        }

        .kpi-value.purple {
            color: var(--purple);
        }

        /* Chart containers */
        .chart-box {
            position: relative;
            height: 280px;
            width: 100%;
        }

        .chart-box.tall {
            height: 340px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th,
        td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--gray);
        }

        th {
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            color: var(--text);
        }

        th .sort-arrow {
            font-size: 0.7rem;
            margin-left: 4px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(96, 165, 250, 0.04);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge.agency-collapse {
            background: rgba(248, 113, 113, 0.12);
            color: var(--red);
        }

        .badge.constraint-drift {
            background: rgba(245, 197, 66, 0.12);
            color: #b4860b;
        }

        .badge.no-constraints {
            background: rgba(148, 163, 184, 0.15);
            color: var(--slate);
        }

        .badge.task-maintained {
            background: rgba(34, 197, 94, 0.12);
            color: var(--green);
        }

        .badge.task-shift {
            background: rgba(192, 132, 252, 0.12);
            color: var(--purple);
        }

        .mono {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82rem;
        }

        .inspect-link {
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .inspect-link:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        @media (max-width: 900px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>Implicit State Pathology</h1>
                <p class="subtitle" id="header-subtitle">Interactional Cartography Findings Dashboard &bull; Loading
                    N...</p>
            </div>
            <div class="nav-links">
                <a href="index.html">&larr; Suite Home</a>
                <a href="global_view.html">Global View</a>
                <a href="compare.html">Compare</a>
                <a href="explorer.html">Explorer</a>
            </div>
        </div>

        <div id="dashboard-content">
            <div class="loading">Loading dashboard data&hellip;</div>
        </div>
    </div>

    <script>
        // ─── Color palette ───────────────────────────────────────────
        const COLORS = {
            blue: '#60a5fa', purple: '#c084fc', green: '#22c55e',
            red: '#f87171', orange: '#e85a3c', yellow: '#f5c542',
            slate: '#94a3b8', gray: '#e5e5e5', text: '#1a1a1a', dim: '#888'
        };

        const STABILITY_COLORS = {
            'Agency Collapse': COLORS.red,
            'Constraint Drift': COLORS.yellow,
            'No Constraints': COLORS.slate,
            'Task Maintained': COLORS.green,
            'Task Shift': COLORS.purple
        };

        const STABILITY_ORDER = ['Agency Collapse', 'Constraint Drift', 'No Constraints', 'Task Maintained', 'Task Shift'];

        // ─── Chart.js defaults ───────────────────────────────────────
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.font.size = 12;
        Chart.defaults.color = COLORS.dim;
        Chart.defaults.plugins.legend.labels.usePointStyle = true;
        Chart.defaults.plugins.legend.labels.pointStyle = 'circle';

        // ─── Load both data files in parallel ────────────────────────
        Promise.all([
            fetch('data/dashboard_data.json').then(r => r.json()),
            fetch('data/meta_graph.json').then(r => r.json())
        ]).then(([dd, mg]) => {
            renderAll(dd, mg);
        }).catch(err => {
            console.error('Failed to load data:', err);
            document.getElementById('dashboard-content').innerHTML =
                `<div class="loading" style="color:var(--red);">Error loading data: ${err.message}</div>`;
        });

        function renderAll(dd, mg) {
            // Build lookup from meta_graph nodes
            const mgLookup = {};
            (mg.nodes || []).forEach(n => { mgLookup[n.id] = n; });

            // Merge per_conversation with meta_graph
            const merged = (dd.per_conversation || []).map(pc => {
                const mn = mgLookup[pc.id] || {};
                return { ...pc, ...mn, _pc: pc };
            });

            // Update header count
            const headerSubtitle = document.getElementById('header-subtitle');
            if (headerSubtitle && dd.kpis && dd.kpis.total_conversations) {
                headerSubtitle.innerHTML = `Interactional Cartography Findings Dashboard &bull; N=${dd.kpis.total_conversations.toLocaleString()} Conversations`;
            }

            const el = document.getElementById('dashboard-content');
            el.innerHTML = '';

            // Section 1: KPIs
            el.innerHTML += renderKPIs(dd.kpis);

            // Section 2: ISP Story
            el.innerHTML += `<div class="section-title">The ISP Story</div>`;
            el.innerHTML += `<div class="grid-3">
                <div class="card"><h3>Stability Class Distribution</h3><div class="chart-box"><canvas id="chart-stability"></canvas></div></div>
                <div class="card"><h3>Violation Timing (Turn Number)</h3><div class="chart-box"><canvas id="chart-timing"></canvas></div></div>
                <div class="card"><h3>Constraint Outcomes</h3><div class="chart-box"><canvas id="chart-outcomes"></canvas></div></div>
            </div>`;

            // Section 3: Architecture Comparison
            el.innerHTML += `<div class="section-title">Architecture Comparison</div>`;
            el.innerHTML += `<div class="full-width card"><h3>Drift Velocity, Survival Rate &amp; Mode Violation Rate by Architecture</h3><div class="chart-box tall"><canvas id="chart-arch"></canvas></div></div>`;

            // Section 4: SRT Role Distributions
            el.innerHTML += `<div class="section-title">SRT Role Distributions</div>`;
            el.innerHTML += `<div class="grid-2">
                <div class="card"><h3>Human Role Distribution</h3><div class="chart-box"><canvas id="chart-human-roles"></canvas></div></div>
                <div class="card"><h3>AI Role Distribution</h3><div class="chart-box"><canvas id="chart-ai-roles"></canvas></div></div>
            </div>`;
            el.innerHTML += `<div class="grid-2">
                <div class="card"><h3>Interaction Pattern Distribution</h3><div class="chart-box"><canvas id="chart-interaction"></canvas></div></div>
                <div class="card"><h3>Power Dynamics Distribution</h3><div class="chart-box"><canvas id="chart-power"></canvas></div></div>
            </div>`;

            // Section 5: PAD Affect
            el.innerHTML += `<div class="section-title">PAD Affect Overview</div>`;
            el.innerHTML += `<div class="grid-3">
                <div class="card"><h3>Mean Pleasure Distribution</h3><div class="chart-box"><canvas id="chart-pleasure"></canvas></div></div>
                <div class="card"><h3>Mean Arousal Distribution</h3><div class="chart-box"><canvas id="chart-arousal"></canvas></div></div>
                <div class="card"><h3>Mean Dominance Distribution</h3><div class="chart-box"><canvas id="chart-dominance"></canvas></div></div>
            </div>`;

            // Section 6: Conversation Table
            el.innerHTML += `<div class="section-title">Top Conversations by Drift Velocity</div>`;
            el.innerHTML += `<div class="full-width card" style="overflow-x:auto;">${renderTable(merged)}</div>`;

            // Now render all charts
            renderStabilityChart(dd.by_stability_class);
            renderTimingChart(dd.violation_timing);
            renderOutcomesChart(dd.constraint_states);
            renderArchChart(dd.by_architecture);
            renderRoleCharts(mg.nodes || []);
            renderPADCharts(mg.nodes || []);
            initTableSort(merged);
        }

        // ─── Section 1: KPIs ─────────────────────────────────────────
        function renderKPIs(kpis) {
            return `<div class="grid-4">
                <div class="card">
                    <h3>Conversations Analyzed</h3>
                    <div class="kpi-value blue">${kpis.total_conversations}</div>
                    <div class="kpi-detail">v2_unified corpus</div>
                </div>
                <div class="card">
                    <h3>${kpis.constraint_survival.label}</h3>
                    <div class="kpi-value red">${kpis.constraint_survival.value}%</div>
                    <div class="kpi-detail">${kpis.constraint_survival.detail} constraints survived</div>
                </div>
                <div class="card">
                    <h3>${kpis.turn_half_life.label}</h3>
                    <div class="kpi-value orange">${kpis.turn_half_life.value} turns</div>
                    <div class="kpi-detail">Median constraint lifespan</div>
                </div>
                <div class="card">
                    <h3>${kpis.mode_violation_rate.label}</h3>
                    <div class="kpi-value purple">${kpis.mode_violation_rate.value}%</div>
                    <div class="kpi-detail">Conversations with mode violations</div>
                </div>
            </div>`;
        }

        // ─── Section 2a: Stability doughnut ──────────────────────────
        function renderStabilityChart(data) {
            const labels = STABILITY_ORDER;
            const values = labels.map(l => (data[l] || {}).n || 0);
            const colors = labels.map(l => STABILITY_COLORS[l]);

            new Chart(document.getElementById('chart-stability'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 12, font: { size: 11 } } },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.label}: ${ctx.raw} (${((ctx.raw / 744) * 100).toFixed(1)}%)`
                            }
                        }
                    }
                }
            });
        }

        // ─── Section 2b: Violation timing bar ────────────────────────
        function renderTimingChart(data) {
            const turns = Object.keys(data).map(Number).sort((a, b) => a - b);
            const values = turns.map(t => data[t]);

            new Chart(document.getElementById('chart-timing'), {
                type: 'bar',
                data: {
                    labels: turns.map(t => `Turn ${t}`),
                    datasets: [{
                        label: 'Violations',
                        data: values,
                        backgroundColor: COLORS.orange + 'cc',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { title: { display: true, text: 'Count' }, grid: { color: COLORS.gray } }
                    }
                }
            });
        }

        // ─── Section 2c: Constraint outcomes horizontal bar ──────────
        function renderOutcomesChart(data) {
            new Chart(document.getElementById('chart-outcomes'), {
                type: 'bar',
                data: {
                    labels: ['SURVIVED', 'VIOLATED'],
                    datasets: [{
                        data: [data.SURVIVED, data.VIOLATED],
                        backgroundColor: [COLORS.green, COLORS.red],
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const total = data.SURVIVED + data.VIOLATED;
                                    return `${ctx.raw} (${((ctx.raw / total) * 100).toFixed(1)}%)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: COLORS.gray }, title: { display: true, text: 'Constraints' } },
                        y: { grid: { display: false } }
                    }
                }
            });
        }

        // ─── Section 3: Architecture grouped bar ─────────────────────
        function renderArchChart(data) {
            const archs = Object.keys(data).sort();
            new Chart(document.getElementById('chart-arch'), {
                type: 'bar',
                data: {
                    labels: archs,
                    datasets: [
                        {
                            label: 'Drift Velocity',
                            data: archs.map(a => data[a].drift_velocity),
                            backgroundColor: COLORS.blue,
                            borderRadius: 4
                        },
                        {
                            label: 'Survival Rate',
                            data: archs.map(a => data[a].survival_rate),
                            backgroundColor: COLORS.green,
                            borderRadius: 4
                        },
                        {
                            label: 'Mode Violation Rate',
                            data: archs.map(a => data[a].mode_violation_rate),
                            backgroundColor: COLORS.red,
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: COLORS.gray }, title: { display: true, text: 'Rate' } }
                    }
                }
            });
        }

        // ─── Section 4: Role distribution charts ─────────────────────
        function renderRoleCharts(nodes) {
            const validNodes = nodes.filter(n => n.dominant_human_role);

            // Human roles
            const humanCounts = {};
            validNodes.forEach(n => {
                const r = n.dominant_human_role;
                humanCounts[r] = (humanCounts[r] || 0) + 1;
            });
            renderHorizontalBar('chart-human-roles', humanCounts, COLORS.blue);

            // AI roles
            const aiCounts = {};
            validNodes.forEach(n => {
                const r = n.dominant_ai_role;
                if (r) aiCounts[r] = (aiCounts[r] || 0) + 1;
            });
            renderHorizontalBar('chart-ai-roles', aiCounts, COLORS.purple);

            // Interaction patterns
            const patternCounts = {};
            validNodes.forEach(n => {
                const p = n.interactionPattern;
                if (p) patternCounts[p] = (patternCounts[p] || 0) + 1;
            });
            renderHorizontalBar('chart-interaction', patternCounts, COLORS.green);

            // Power dynamics
            const powerCounts = {};
            validNodes.forEach(n => {
                const p = n.powerDynamics;
                if (p) powerCounts[p] = (powerCounts[p] || 0) + 1;
            });
            renderHorizontalBar('chart-power', powerCounts, COLORS.orange);
        }

        function renderHorizontalBar(canvasId, counts, color) {
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(e => e[0]);
            const values = sorted.map(e => e[1]);
            const total = values.reduce((s, v) => s + v, 0);

            new Chart(document.getElementById(canvasId), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: color + 'cc',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.raw} (${((ctx.raw / total) * 100).toFixed(1)}%)`
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: COLORS.gray }, title: { display: true, text: 'Count' } },
                        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
                    }
                }
            });
        }

        // ─── Section 5: PAD histograms ───────────────────────────────
        function renderPADCharts(nodes) {
            renderHistogram('chart-pleasure', nodes.map(n => n.mean_pleasure).filter(v => v != null), 'Pleasure', COLORS.green);
            renderHistogram('chart-arousal', nodes.map(n => n.mean_arousal).filter(v => v != null), 'Arousal', COLORS.orange);
            renderHistogram('chart-dominance', nodes.map(n => n.mean_dominance).filter(v => v != null), 'Dominance', COLORS.purple);
        }

        function renderHistogram(canvasId, values, label, color) {
            if (!values.length) return;
            const bins = 20;
            const min = 0, max = 1;
            const step = (max - min) / bins;
            const counts = new Array(bins).fill(0);
            values.forEach(v => {
                const idx = Math.min(Math.floor((v - min) / step), bins - 1);
                counts[idx]++;
            });
            const labels = counts.map((_, i) => (min + i * step).toFixed(2));

            new Chart(document.getElementById(canvasId), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: counts,
                        backgroundColor: color + '99',
                        borderColor: color,
                        borderWidth: 1,
                        borderRadius: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, title: { display: true, text: label }, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
                        y: { grid: { color: COLORS.gray }, title: { display: true, text: 'Count' } }
                    }
                }
            });
        }

        // ─── Section 6: Table ────────────────────────────────────────
        function renderTable(merged) {
            const sorted = [...merged].sort((a, b) => (b.drift || b.drift_velocity || 0) - (a.drift || a.drift_velocity || 0)).slice(0, 20);
            return `<table id="conv-table">
                <thead><tr>
                    <th data-col="id">ID</th>
                    <th data-col="class">Stability</th>
                    <th data-col="arch">Architecture</th>
                    <th data-col="turns" data-type="num">Turns</th>
                    <th data-col="violations" data-type="num">Violations</th>
                    <th data-col="constraints" data-type="num">Constraints</th>
                    <th data-col="drift" data-type="num">Drift Vel.</th>
                    <th data-col="human_role">Human Role</th>
                    <th data-col="ai_role">AI Role</th>
                    <th data-col="pleasure" data-type="num">Pleasure</th>
                    <th></th>
                </tr></thead>
                <tbody>${sorted.map(d => tableRow(d)).join('')}</tbody>
            </table>`;
        }

        function tableRow(d) {
            const cls = (d.class || d.stability || '').toLowerCase().replace(/\s+/g, '-');
            const driftVal = d.drift || d.drift_velocity || 0;
            const filename = d.filename || d.id + '.json';
            return `<tr>
                <td class="mono">${(d.id || '').slice(0, 28)}</td>
                <td><span class="badge ${cls}">${d.class || d.stability || '—'}</span></td>
                <td>${d.arch || '—'}</td>
                <td>${d.turns || d.turn_count || '—'}</td>
                <td>${d.violations || d.violation_count || 0}</td>
                <td>${d.constraints || d.constraint_count || 0}</td>
                <td class="mono">${driftVal.toFixed(4)}</td>
                <td>${d.dominant_human_role || '—'}</td>
                <td>${d.dominant_ai_role || '—'}</td>
                <td>${d.mean_pleasure != null ? d.mean_pleasure.toFixed(2) : '—'}</td>
                <td><a class="inspect-link" href="explorer.html?file=${filename}">Inspect &rarr;</a></td>
            </tr>`;
        }

        function initTableSort(merged) {
            const table = document.getElementById('conv-table');
            if (!table) return;
            const headers = table.querySelectorAll('th[data-col]');
            let currentSort = { col: 'drift', dir: 'desc' };

            headers.forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.dataset.col;
                    const isNum = th.dataset.type === 'num';
                    const dir = (currentSort.col === col && currentSort.dir === 'desc') ? 'asc' : 'desc';
                    currentSort = { col, dir };

                    const sorted = [...merged].sort((a, b) => {
                        let va, vb;
                        if (col === 'drift') {
                            va = a.drift || a.drift_velocity || 0;
                            vb = b.drift || b.drift_velocity || 0;
                        } else if (col === 'human_role') {
                            va = a.dominant_human_role || '';
                            vb = b.dominant_human_role || '';
                        } else if (col === 'ai_role') {
                            va = a.dominant_ai_role || '';
                            vb = b.dominant_ai_role || '';
                        } else if (col === 'pleasure') {
                            va = a.mean_pleasure || 0;
                            vb = b.mean_pleasure || 0;
                        } else if (col === 'turns') {
                            va = a.turns || a.turn_count || 0;
                            vb = b.turns || b.turn_count || 0;
                        } else if (col === 'violations') {
                            va = a.violations || a.violation_count || 0;
                            vb = b.violations || b.violation_count || 0;
                        } else if (col === 'constraints') {
                            va = a.constraints || a.constraint_count || 0;
                            vb = b.constraints || b.constraint_count || 0;
                        } else {
                            va = a[col] || '';
                            vb = b[col] || '';
                        }

                        if (isNum || typeof va === 'number') {
                            return dir === 'desc' ? vb - va : va - vb;
                        }
                        return dir === 'desc' ? String(vb).localeCompare(String(va)) : String(va).localeCompare(String(vb));
                    }).slice(0, 20);

                    const tbody = table.querySelector('tbody');
                    tbody.innerHTML = sorted.map(d => tableRow(d)).join('');

                    // Update sort indicators
                    headers.forEach(h => {
                        h.querySelector('.sort-arrow')?.remove();
                    });
                    const arrow = document.createElement('span');
                    arrow.className = 'sort-arrow';
                    arrow.textContent = dir === 'desc' ? ' \u25BC' : ' \u25B2';
                    th.appendChild(arrow);
                });
            });
        }
    </script>
</body>

</html>
